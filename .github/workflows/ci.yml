name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend install dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # - name: Run tests
      #   run: npm test
      #   env:
      #     DB_USER: ${{ secrets.DB_USER }}
      #     DB_PASS: ${{ secrets.DB_PASS }}
      #     DB_NAME: ${{ secrets.DB_NAME }}

  frontend:
    name: Frontend install dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # - name: Run tests
      #   run: npm test -- --watchAll=false

      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

  wait-for-netlify:
    name: Wait for Netlify Deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    outputs:
      url: ${{ steps.wait.outputs.url }}
    steps:
      - name: Wait for Netlify deployment
        uses: jakepartusch/wait-for-netlify-action@v1.4
        id: wait
        with:
          site_name: "https://mcmachowski-recipe-searcher.netlify.app"

  e2e:
    name: E2E – Playwright
    runs-on: ubuntu-latest
    needs: [wait-for-netlify]
    defaults:
      run:
        working-directory: tests
    env:
      BASE_URL: ${{ needs.wait-for-netlify.outputs.url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tests/playwright-report
          destination_dir: playwright-report

      - name: Add report link to summary
        if: always()
        run: |
          echo "### 🎭 Playwright Test Report" >> $GITHUB_STEP_SUMMARY
          echo "[See test report](https://mcmachowski.github.io/RecipeSearcher/playwright-report/)" >> $GITHUB_STEP_SUMMARY