name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  backend:
    name: Backend install dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

  frontend:
    name: Frontend install dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

  api-tests:
    name: API tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: tests
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      API_URL: ${{ vars.API_URL }}
      PLAYWRIGHT_HTML_REPORT: playwright-report-api
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test --project=api-tests

      - name: Upload API report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: tests/playwright-report-api/
          retention-days: 14

  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: tests
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      NORMAL_USER_EMAIL: ${{ secrets.NORMAL_USER_EMAIL }}
      NORMAL_USER_PASSWORD: ${{ secrets.NORMAL_USER_PASSWORD }}
      EDIT_PROFILE_USER_EMAIL: ${{ secrets.EDIT_PROFILE_USER_EMAIL }}
      EDIT_PROFILE_USER_PASSWORD: ${{ secrets.EDIT_PROFILE_USER_PASSWORD }}
      PLAYWRIGHT_HTML_REPORT: playwright-report-e2e
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx playwright test --project=setup --project=admin-tests --project=user-tests --project=common-tests

      - name: Upload E2E report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-e2e
          path: tests/playwright-report-e2e/
          retention-days: 14

  publish-reports:
    name: Publish reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-tests]
    if: always()
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download API report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-api
          path: combined-report/api

      - name: Download E2E report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-e2e
          path: combined-report/e2e

      - name: Deploy reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: combined-report
          destination_dir: playwright-report

      - name: Add report links to summary
        run: |
          echo "### 🎭 Playwright Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "- [E2E report](https://mcmachowski.github.io/RecipeSearcher/playwright-report/e2e/)" >> $GITHUB_STEP_SUMMARY
          echo "- [API report](https://mcmachowski.github.io/RecipeSearcher/playwright-report/api/)" >> $GITHUB_STEP_SUMMARY